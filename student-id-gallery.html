<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student ID Gallery - Admin Panel</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  body { background: #0f0f1a; color: #e0e0e0; min-height: 100vh; }
  .hidden { display: none !important; }

  /* ===== CONTAINER / PAGE ===== */
  .page { max-width: 960px; margin: 0 auto; padding: 30px 20px; }

  /* ===== LOGIN PAGE ===== */
  #loginPage { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .login-card {
    background: linear-gradient(145deg, #1a1a2e, #16213e);
    padding: 50px 40px; border-radius: 20px; width: 400px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 40px rgba(78,204,163,0.08);
    border: 1px solid rgba(78,204,163,0.15);
  }
  .login-card h1 { text-align: center; margin-bottom: 8px; font-size: 28px; color: #4ecca3; }
  .login-card p.sub { text-align: center; color: #888; margin-bottom: 30px; font-size: 14px; }
  .login-card label { display: block; margin-bottom: 6px; font-size: 13px; color: #aaa; font-weight: 600; }
  .login-card input {
    width: 100%; padding: 12px 16px; margin-bottom: 20px; border: 1px solid #333;
    border-radius: 10px; background: #0f0f1a; color: #e0e0e0; font-size: 15px; outline: none;
    transition: border-color 0.3s;
  }
  .login-card input:focus { border-color: #4ecca3; }
  .login-card button {
    width: 100%; padding: 14px; background: linear-gradient(135deg, #4ecca3, #2d9f7a);
    border: none; border-radius: 10px; color: #0f0f1a; font-size: 16px; font-weight: 700;
    cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
  }
  .login-card button:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(78,204,163,0.3); }
  .login-error { color: #ff6b6b; font-size: 13px; margin-top: -12px; margin-bottom: 12px; text-align: center; min-height: 20px; }

  /* ===== ADMIN HEADER ===== */
  .admin-header {
    display: flex; justify-content: space-between; align-items: center;
    background: linear-gradient(145deg, #1a1a2e, #16213e);
    padding: 16px 30px; border-radius: 16px; margin-bottom: 30px;
    border: 1px solid rgba(78,204,163,0.1);
  }
  .admin-header h2 { color: #4ecca3; font-size: 20px; }
  .admin-header .nav { display: flex; gap: 10px; align-items: center; }
  .admin-header .nav button {
    padding: 8px 18px; border: 1px solid #333; border-radius: 8px;
    background: transparent; color: #e0e0e0; cursor: pointer; font-size: 13px;
    transition: all 0.25s;
  }
  .admin-header .nav button:hover { border-color: #4ecca3; color: #4ecca3; }
  .admin-header .nav .logout { border-color: #ff6b6b; color: #ff6b6b; }
  .admin-header .nav .logout:hover { background: rgba(255,107,107,0.15); }
  .admin-header .nav .active { background: #4ecca3; color: #0f0f1a; border-color: #4ecca3; font-weight: 600; }

  /* ===== UPLOAD FORM ===== */
  .form-card {
    background: linear-gradient(145deg, #1a1a2e, #16213e);
    padding: 35px; border-radius: 20px;
    box-shadow: 0 15px 50px rgba(0,0,0,0.4);
    border: 1px solid rgba(78,204,163,0.08);
  }
  .form-card h2 { color: #4ecca3; margin-bottom: 25px; font-size: 22px; display: flex; align-items: center; gap: 10px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 18px; }
  .form-row.three { grid-template-columns: 1fr 1fr 1fr; }
  .form-group { display: flex; flex-direction: column; }
  .form-group.full { grid-column: 1 / -1; }
  .form-group label { font-size: 12px; color: #aaa; font-weight: 600; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-group input, .form-group select, .form-group textarea {
    padding: 10px 14px; border: 1px solid #333; border-radius: 8px;
    background: #0f0f1a; color: #e0e0e0; font-size: 14px; outline: none;
    transition: border-color 0.3s;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #4ecca3; }
  .form-group textarea { resize: vertical; min-height: 60px; }
  .form-group input[type="file"] { padding: 8px; }
  .form-group input[type="file"]::file-selector-button {
    padding: 6px 14px; border: 1px solid #4ecca3; border-radius: 6px;
    background: rgba(78,204,163,0.1); color: #4ecca3; cursor: pointer; margin-right: 10px;
    font-size: 12px; transition: background 0.2s;
  }
  .form-group input[type="file"]::file-selector-button:hover { background: rgba(78,204,163,0.25); }
  .img-preview { width: 100px; height: 100px; object-fit: cover; border-radius: 10px; border: 2px dashed #333; margin-top: 8px; }
  .btn-primary {
    padding: 12px 32px; background: linear-gradient(135deg, #4ecca3, #2d9f7a);
    border: none; border-radius: 10px; color: #0f0f1a; font-size: 15px; font-weight: 700;
    cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(78,204,163,0.3); }
  .btn-secondary {
    padding: 10px 24px; background: transparent; border: 1px solid #4ecca3;
    border-radius: 8px; color: #4ecca3; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all 0.25s;
  }
  .btn-secondary:hover { background: rgba(78,204,163,0.1); }
  .form-actions { display: flex; gap: 12px; align-items: center; margin-top: 10px; }
  .form-msg { font-size: 14px; padding: 10px 16px; border-radius: 8px; margin-top: 15px; }
  .form-msg.success { background: rgba(78,204,163,0.15); color: #4ecca3; border: 1px solid rgba(78,204,163,0.3); }
  .form-msg.error { background: rgba(255,107,107,0.15); color: #ff6b6b; border: 1px solid rgba(255,107,107,0.3); }

  /* ===== STUDENT COUNT ===== */
  .stats-bar {
    display: flex; gap: 20px; margin-bottom: 25px; flex-wrap: wrap;
  }
  .stat-card {
    background: linear-gradient(145deg, #1a1a2e, #16213e);
    padding: 18px 24px; border-radius: 14px; flex: 1; min-width: 140px;
    border: 1px solid rgba(78,204,163,0.08); text-align: center;
  }
  .stat-card .num { font-size: 32px; font-weight: 700; color: #4ecca3; }
  .stat-card .label { font-size: 12px; color: #888; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

  /* ===== GALLERY (National ID Cards) ===== */
  .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 24px; }

  .id-card {
    background: #fff; border-radius: 16px; overflow: hidden;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    transition: transform 0.3s, box-shadow 0.3s;
    position: relative;
  }
  .id-card:hover { transform: translateY(-6px); box-shadow: 0 18px 50px rgba(0,0,0,0.4); }

  /* ID Card Header */
  .id-card .card-header {
    background: linear-gradient(135deg, #0a1628, #1a2a4a);
    padding: 18px 20px; display: flex; align-items: center; gap: 12px;
    border-bottom: 3px solid #c8a84e;
  }
  .id-card .card-header .emblem {
    width: 40px; height: 40px; background: #c8a84e; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 900; color: #0a1628; flex-shrink: 0;
  }
  .id-card .card-header .title-area { flex: 1; }
  .id-card .card-header .title-area .nation { font-size: 16px; font-weight: 800; color: #c8a84e; letter-spacing: 1px; }
  .id-card .card-header .title-area .sub { font-size: 10px; color: #8899bb; text-transform: uppercase; letter-spacing: 1px; }
  .id-card .card-header .badge { font-size: 10px; background: #c8a84e; color: #0a1628; padding: 2px 10px; border-radius: 4px; font-weight: 700; }

  /* ID Card Body */
  .id-card .card-body { padding: 20px; display: flex; gap: 20px; background: #fff; }
  .id-card .card-body .photo {
    width: 110px; height: 130px; border-radius: 8px; border: 2px solid #ddd;
    object-fit: cover; flex-shrink: 0; background: #f5f5f5;
    display: flex; align-items: center; justify-content: center; color: #999; font-size: 12px;
  }
  .id-card .card-body .details { flex: 1; display: flex; flex-direction: column; gap: 4px; }
  .id-card .card-body .details .row { display: flex; border-bottom: 1px dotted #eee; padding: 3px 0; }
  .id-card .card-body .details .row .lbl { font-size: 10px; color: #888; width: 75px; flex-shrink: 0; text-transform: uppercase; letter-spacing: 0.3px; }
  .id-card .card-body .details .row .val { font-size: 13px; color: #222; font-weight: 600; }

  /* ID Card Footer */
  .id-card .card-footer {
    padding: 10px 20px; background: #f8f8f8; border-top: 1px solid #eee;
    display: flex; justify-content: space-between; align-items: center;
  }
  .id-card .card-footer .id-num { font-size: 11px; color: #999; font-family: monospace; }
  .id-card .card-footer .del-btn {
    padding: 4px 12px; border: none; border-radius: 6px; background: #ff6b6b;
    color: #fff; font-size: 11px; cursor: pointer; transition: background 0.2s;
  }
  .id-card .card-footer .del-btn:hover { background: #e05555; }

  /* ===== GALLERY LOCK OVERLAY ===== */
  #galleryLockOverlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    display: flex; align-items: center; justify-content: center; z-index: 1000;
  }
  #galleryLockOverlay .lock-card {
    background: linear-gradient(145deg, #1a1a2e, #16213e);
    padding: 40px; border-radius: 20px; width: 380px;
    border: 1px solid rgba(78,204,163,0.15);
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }
  #galleryLockOverlay .lock-card h2 { color: #4ecca3; margin-bottom: 8px; text-align: center; }
  #galleryLockOverlay .lock-card p.sub { text-align: center; color: #888; font-size: 13px; margin-bottom: 24px; }
  #galleryLockOverlay .lock-card input {
    width: 100%; padding: 12px 16px; margin-bottom: 16px; border: 1px solid #333;
    border-radius: 10px; background: #0f0f1a; color: #e0e0e0; font-size: 15px; outline: none;
  }
  #galleryLockOverlay .lock-card input:focus { border-color: #4ecca3; }
  #galleryLockOverlay .lock-card button {
    width: 100%; padding: 14px; background: linear-gradient(135deg, #4ecca3, #2d9f7a);
    border: none; border-radius: 10px; color: #0f0f1a; font-size: 16px; font-weight: 700;
    cursor: pointer; margin-bottom: 10px; transition: transform 0.2s;
  }
  #galleryLockOverlay .lock-card button:hover { transform: translateY(-2px); }
  #galleryLockOverlay .lock-card .cancel-btn {
    background: transparent; border: 1px solid #555; color: #aaa;
  }
  #galleryLockOverlay .lock-card .cancel-btn:hover { border-color: #ff6b6b; color: #ff6b6b; background: transparent; transform: none; }
  .lock-error { color: #ff6b6b; font-size: 13px; text-align: center; min-height: 20px; margin-bottom: 4px; }

  /* ===== DELETE CONFIRM MODAL ===== */
  #deleteModal {
    position: fixed; inset: 0; background: rgba(0,0,0,0.8);
    display: flex; align-items: center; justify-content: center; z-index: 1100;
  }
  #deleteModal .del-card {
    background: #1a1a2e; padding: 30px; border-radius: 16px; width: 340px; text-align: center;
    border: 1px solid rgba(255,107,107,0.2);
  }
  #deleteModal .del-card h3 { color: #ff6b6b; margin-bottom: 10px; }
  #deleteModal .del-card p { color: #aaa; margin-bottom: 20px; font-size: 14px; }
  #deleteModal .del-card .btn-group { display: flex; gap: 10px; justify-content: center; }
  #deleteModal .del-card .btn-group button { padding: 10px 24px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; font-size: 14px; }
  #deleteModal .del-card .btn-group .confirm { background: #ff6b6b; color: #fff; }
  #deleteModal .del-card .btn-group .confirm:hover { background: #e05555; }
  #deleteModal .del-card .btn-group .cancel { background: #333; color: #ccc; }
  #deleteModal .del-card .btn-group .cancel:hover { background: #444; }

  /* ===== NO STUDENTS ===== */
  .empty-state { text-align: center; padding: 60px 20px; color: #666; }
  .empty-state .icon { font-size: 64px; margin-bottom: 16px; }
  .empty-state h3 { font-size: 20px; color: #888; margin-bottom: 8px; }
  .empty-state p { font-size: 14px; }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 640px) {
    .form-row { grid-template-columns: 1fr; }
    .form-row.three { grid-template-columns: 1fr; }
    .login-card { width: 100%; padding: 30px 20px; }
    .admin-header { flex-direction: column; gap: 12px; text-align: center; }
    .admin-header .nav { flex-wrap: wrap; justify-content: center; }
    .gallery-grid { grid-template-columns: 1fr; }
    .id-card .card-body { flex-direction: column; align-items: center; text-align: center; }
    .id-card .card-body .details .row { flex-direction: column; align-items: center; }
    .id-card .card-body .details .row .lbl { width: auto; }
    .stats-bar { flex-direction: column; }
    #galleryLockOverlay .lock-card { width: 90%; padding: 24px; }
  }
</style>
</head>
<body>

<!-- ============ LOGIN PAGE ============ -->
<div id="loginPage" class="page">
  <div class="login-card">
    <h1>Student ID Gallery</h1>
    <p class="sub">Admin Login</p>
    <form id="loginForm" autocomplete="off">
      <label for="adminId">Admin ID</label>
      <input type="text" id="adminId" placeholder="Enter admin ID" value="ktmv" required>
      <label for="adminPass">Password</label>
      <input type="password" id="adminPass" placeholder="Enter password" required>
      <div class="login-error" id="loginError"></div>
      <button type="submit">Sign In</button>
    </form>
  </div>
</div>

<!-- ============ ADMIN DASHBOARD (after login) ============ -->
<div id="dashboardPage" class="page hidden">
  <div class="admin-header">
    <h2>Student ID Gallery</h2>
    <div class="nav">
      <button id="navUpload" class="active">Upload</button>
      <button id="navGallery">View Gallery</button>
      <button id="logoutBtn" class="logout">Logout</button>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat-card">
      <div class="num" id="studentCount">0</div>
      <div class="label">Students</div>
    </div>
    <div class="stat-card">
      <div class="num" id="withPhoto">0</div>
      <div class="label">With Photos</div>
    </div>
    <div class="stat-card">
      <div class="num" id="lastAdded">-</div>
      <div class="label">Last Added</div>
    </div>
  </div>

  <!-- ===== UPLOAD SECTION ===== -->
  <div id="uploadSection">
    <div class="form-card">
      <h2>Upload Student Details</h2>
      <form id="studentForm" autocomplete="off">
        <div class="form-row">
          <div class="form-group">
            <label>Student Name</label>
            <input type="text" id="sName" placeholder="Full name" required>
          </div>
          <div class="form-group">
            <label>Roll Number</label>
            <input type="text" id="sRoll" placeholder="e.g. 2024-001" required>
          </div>
        </div>
        <div class="form-row three">
          <div class="form-group">
            <label>Class / Course</label>
            <input type="text" id="sClass" placeholder="e.g. 10th Grade" required>
          </div>
          <div class="form-group">
            <label>Section</label>
            <input type="text" id="sSection" placeholder="e.g. A">
          </div>
          <div class="form-group">
            <label>Year</label>
            <input type="text" id="sYear" placeholder="e.g. 2025-26">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Date of Birth</label>
            <input type="date" id="sDob" required>
          </div>
          <div class="form-group">
            <label>Blood Group</label>
            <select id="sBlood">
              <option value="">-- Select --</option>
              <option>A+</option><option>A-</option><option>B+</option><option>B-</option>
              <option>AB+</option><option>AB-</option><option>O+</option><option>O-</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" id="sPhone" placeholder="Student phone">
          </div>
          <div class="form-group">
            <label>Parent / Guardian</label>
            <input type="text" id="sParent" placeholder="Parent name">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group full">
            <label>Address</label>
            <textarea id="sAddress" placeholder="Full address"></textarea>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Student Photo</label>
            <input type="file" id="sPhoto" accept="image/*">
            <img id="photoPreview" class="img-preview hidden" alt="Preview">
          </div>
          <div class="form-group" style="justify-content:flex-end;">
            <label style="visibility:hidden;">.</label>
            <div class="form-actions">
              <button type="submit" class="btn-primary">Save Student</button>
              <button type="reset" class="btn-secondary" id="resetBtn">Reset</button>
            </div>
          </div>
        </div>
      </form>
      <div id="formMsg" class="form-msg hidden"></div>
    </div>
  </div>

  <!-- ===== GALLERY SECTION ===== -->
  <div id="gallerySection" class="hidden">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:10px;">
      <h2 style="color:#4ecca3; font-size:20px;">Student ID Cards</h2>
      <div style="display:flex; gap:8px;">
        <input type="text" id="gallerySearch" placeholder="Search name or roll..." style="padding:8px 14px; border:1px solid #333; border-radius:8px; background:#0f0f1a; color:#e0e0e0; font-size:13px; outline:none; width:200px;">
      </div>
    </div>
    <div id="galleryGrid" class="gallery-grid"></div>
  </div>
</div>

<!-- ============ GALLERY LOCK OVERLAY ============ -->
<div id="galleryLockOverlay" class="hidden">
  <div class="lock-card">
    <h2>Gallery Access</h2>
    <p class="sub">Enter admin password to view gallery</p>
    <input type="password" id="galleryPass" placeholder="Admin password" autocomplete="off">
    <div class="lock-error" id="galleryLockError"></div>
    <button id="unlockGalleryBtn">Unlock Gallery</button>
    <button id="cancelGalleryLockBtn" class="cancel-btn">Cancel</button>
  </div>
</div>

<!-- ============ DELETE CONFIRM MODAL ============ -->
<div id="deleteModal" class="hidden">
  <div class="del-card">
    <h3>Delete Student</h3>
    <p id="deleteMsg">Are you sure you want to delete this student record?</p>
    <div class="btn-group">
      <button class="confirm" id="confirmDelete">Delete</button>
      <button class="cancel" id="cancelDelete">Cancel</button>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  // ============ CONSTANTS ============
  const ADMIN_ID = 'ktmv';
  const ADMIN_PASS = 'admin123';
  const STORAGE_KEY = 'studentIdGallery_students';

  // ============ STATE ============
  let currentUser = null;
  let deleteTarget = null;
  let galleryUnlocked = false;
  let students = [];

  // ============ DOM REFS ============
  const loginPage = document.getElementById('loginPage');
  const dashboardPage = document.getElementById('dashboardPage');
  const loginForm = document.getElementById('loginForm');
  const loginError = document.getElementById('loginError');
  const adminIdEl = document.getElementById('adminId');
  const adminPassEl = document.getElementById('adminPass');
  const logoutBtn = document.getElementById('logoutBtn');
  const navUpload = document.getElementById('navUpload');
  const navGallery = document.getElementById('navGallery');
  const uploadSection = document.getElementById('uploadSection');
  const gallerySection = document.getElementById('gallerySection');
  const studentForm = document.getElementById('studentForm');
  const photoInput = document.getElementById('sPhoto');
  const photoPreview = document.getElementById('photoPreview');
  const formMsg = document.getElementById('formMsg');
  const resetBtn = document.getElementById('resetBtn');
  const galleryGrid = document.getElementById('galleryGrid');
  const gallerySearch = document.getElementById('gallerySearch');
  const galleryLockOverlay = document.getElementById('galleryLockOverlay');
  const galleryPass = document.getElementById('galleryPass');
  const galleryLockError = document.getElementById('galleryLockError');
  const unlockGalleryBtn = document.getElementById('unlockGalleryBtn');
  const cancelGalleryLockBtn = document.getElementById('cancelGalleryLockBtn');
  const deleteModal = document.getElementById('deleteModal');
  const deleteMsg = document.getElementById('deleteMsg');
  const confirmDelete = document.getElementById('confirmDelete');
  const cancelDelete = document.getElementById('cancelDelete');
  const studentCount = document.getElementById('studentCount');
  const withPhoto = document.getElementById('withPhoto');
  const lastAdded = document.getElementById('lastAdded');

  // ============ DATA ============
  function loadStudents() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      students = raw ? JSON.parse(raw) : [];
    } catch(e) { students = []; }
  }

  function saveStudents() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(students));
  }

  function updateStats() {
    studentCount.textContent = students.length;
    const withPhotoCount = students.filter(s => s.photo).length;
    withPhoto.textContent = withPhotoCount;
    lastAdded.textContent = students.length > 0 ? students[students.length - 1].name : '-';
  }

  // ============ AUTH ============
  loginForm.addEventListener('submit', function(e) {
    e.preventDefault();
    const id = adminIdEl.value.trim();
    const pass = adminPassEl.value.trim();
    if (id === ADMIN_ID && pass === ADMIN_PASS) {
      currentUser = id;
      loginError.textContent = '';
      loginPage.classList.add('hidden');
      dashboardPage.classList.remove('hidden');
      loadStudents();
      updateStats();
      showUpload();
    } else {
      loginError.textContent = 'Invalid admin ID or password';
    }
  });

  logoutBtn.addEventListener('click', function() {
    currentUser = null;
    galleryUnlocked = false;
    dashboardPage.classList.add('hidden');
    loginPage.classList.remove('hidden');
    adminIdEl.value = 'ktmv';
    adminPassEl.value = '';
    loginError.textContent = '';
    galleryPass.value = '';
    galleryLockError.textContent = '';
  });

  // ============ NAVIGATION ============
  function showUpload() {
    uploadSection.classList.remove('hidden');
    gallerySection.classList.add('hidden');
    navUpload.classList.add('active');
    navGallery.classList.remove('active');
    lockGallery();
  }

  function showGallery() {
    if (galleryUnlocked) {
      uploadSection.classList.add('hidden');
      gallerySection.classList.remove('hidden');
      navUpload.classList.remove('active');
      navGallery.classList.add('active');
      renderGallery();
    } else {
      galleryLockOverlay.classList.remove('hidden');
      galleryPass.value = '';
      galleryLockError.textContent = '';
      galleryPass.focus();
    }
  }

  navUpload.addEventListener('click', showUpload);

  navGallery.addEventListener('click', showGallery);

  // ============ GALLERY LOCK ============
  function unlockGallery() {
    const pass = galleryPass.value.trim();
    if (pass === ADMIN_PASS) {
      galleryUnlocked = true;
      galleryLockOverlay.classList.add('hidden');
      galleryLockError.textContent = '';
      showGallery();
    } else {
      galleryLockError.textContent = 'Incorrect password';
    }
  }

  unlockGalleryBtn.addEventListener('click', unlockGallery);
  galleryPass.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') unlockGallery();
  });

  cancelGalleryLockBtn.addEventListener('click', function() {
    galleryLockOverlay.classList.add('hidden');
    galleryPass.value = '';
    galleryLockError.textContent = '';
  });

  // Re-lock when leaving gallery
  function lockGallery() {
    galleryUnlocked = false;
  }

  // ============ PHOTO PREVIEW ============
  photoInput.addEventListener('change', function() {
    const file = this.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = function(e) {
        photoPreview.src = e.target.result;
        photoPreview.classList.remove('hidden');
      };
      reader.readAsDataURL(file);
    } else {
      photoPreview.classList.add('hidden');
      photoPreview.src = '';
    }
  });

  // ============ STUDENT FORM ============
  function generateStudentId() {
    const prefix = 'STU';
    const rand = Math.random().toString(36).substring(2, 8).toUpperCase();
    return prefix + rand;
  }

  studentForm.addEventListener('submit', function(e) {
    e.preventDefault();
    formMsg.classList.add('hidden');
    formMsg.textContent = '';

    const name = document.getElementById('sName').value.trim();
    const roll = document.getElementById('sRoll').value.trim();
    const className = document.getElementById('sClass').value.trim();
    const section = document.getElementById('sSection').value.trim();
    const year = document.getElementById('sYear').value.trim();
    const dob = document.getElementById('sDob').value;
    const blood = document.getElementById('sBlood').value;
    const phone = document.getElementById('sPhone').value.trim();
    const parent = document.getElementById('sParent').value.trim();
    const address = document.getElementById('sAddress').value.trim();
    const photoFile = photoInput.files[0];

    if (!name || !roll || !className || !dob) {
      showFormMsg('Name, Roll, Class, and DOB are required', 'error');
      return;
    }

    let photoData = null;
    if (photoFile) {
      // photoPreview already has the data
      photoData = photoPreview.src || null;
    }

    const student = {
      id: generateStudentId(),
      name,
      roll,
      class: className,
      section,
      year,
      dob,
      blood,
      phone,
      parent,
      address,
      photo: photoData,
      createdAt: new Date().toISOString()
    };

    students.push(student);
    saveStudents();
    updateStats();
    showFormMsg(`Student "${name}" saved successfully!`, 'success');
    studentForm.reset();
    photoPreview.classList.add('hidden');
    photoPreview.src = '';
  });

  function showFormMsg(text, type) {
    formMsg.textContent = text;
    formMsg.className = 'form-msg ' + type;
    formMsg.classList.remove('hidden');
    setTimeout(function() {
      formMsg.classList.add('hidden');
    }, 4000);
  }

  resetBtn.addEventListener('click', function() {
    photoPreview.classList.add('hidden');
    photoPreview.src = '';
    formMsg.classList.add('hidden');
  });

  // ============ RENDER GALLERY ============
  function renderGallery(filter) {
    galleryGrid.innerHTML = '';
    let list = students;
    if (filter) {
      const f = filter.toLowerCase();
      list = students.filter(s =>
        s.name.toLowerCase().includes(f) || s.roll.toLowerCase().includes(f)
      );
    }

    if (list.length === 0) {
      galleryGrid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1;">
          <div class="icon">&#128203;</div>
          <h3>No Students Found</h3>
          <p>Upload student details to see ID cards here.</p>
        </div>`;
      return;
    }

    list.forEach(function(s) {
      const card = document.createElement('div');
      card.className = 'id-card';

      const photoHtml = s.photo
        ? `<img class="photo" src="${s.photo}" alt="${s.name}">`
        : `<div class="photo">No Photo</div>`;

      const dobFormatted = s.dob ? new Date(s.dob).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' }) : '-';
      const yearDisplay = s.year || '-';

      card.innerHTML = `
        <div class="card-header">
          <div class="emblem">&#9733;</div>
          <div class="title-area">
            <div class="nation">NATIONAL STUDENT ID</div>
            <div class="sub">Republic of Students &middot; Ministry of Education</div>
          </div>
          <div class="badge">${s.class}</div>
        </div>
        <div class="card-body">
          ${photoHtml}
          <div class="details">
            <div class="row"><span class="lbl">Name</span><span class="val">${s.name}</span></div>
            <div class="row"><span class="lbl">Roll No</span><span class="val">${s.roll}</span></div>
            <div class="row"><span class="lbl">Class</span><span class="val">${s.class}${s.section ? ' - ' + s.section : ''}</span></div>
            <div class="row"><span class="lbl">DOB</span><span class="val">${dobFormatted}</span></div>
            <div class="row"><span class="lbl">Blood</span><span class="val">${s.blood || '-'}</span></div>
            <div class="row"><span class="lbl">Guardian</span><span class="val">${s.parent || '-'}</span></div>
            <div class="row"><span class="lbl">Phone</span><span class="val">${s.phone || '-'}</span></div>
            <div class="row"><span class="lbl">Address</span><span class="val">${s.address || '-'}</span></div>
          </div>
        </div>
        <div class="card-footer">
          <span class="id-num">ID: ${s.id} &middot; Yr: ${yearDisplay}</span>
          <button class="del-btn" data-id="${s.id}">Delete</button>
        </div>
      `;

      card.querySelector('.del-btn').addEventListener('click', function() {
        deleteTarget = s.id;
        deleteMsg.textContent = `Delete "${s.name}" (${s.roll})? This cannot be undone.`;
        deleteModal.classList.remove('hidden');
      });

      galleryGrid.appendChild(card);
    });
  }

  // ============ SEARCH ============
  gallerySearch.addEventListener('input', function() {
    renderGallery(this.value.trim());
  });

  // ============ DELETE ============
  confirmDelete.addEventListener('click', function() {
    if (deleteTarget) {
      students = students.filter(s => s.id !== deleteTarget);
      saveStudents();
      updateStats();
      renderGallery(gallerySearch.value.trim());
      deleteTarget = null;
      deleteModal.classList.add('hidden');
    }
  });

  cancelDelete.addEventListener('click', function() {
    deleteTarget = null;
    deleteModal.classList.add('hidden');
  });

  // ============ KEYBOARD SHORTCUTS ============
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      if (!deleteModal.classList.contains('hidden')) {
        deleteTarget = null;
        deleteModal.classList.add('hidden');
      }
      if (!galleryLockOverlay.classList.contains('hidden')) {
        galleryLockOverlay.classList.add('hidden');
      }
    }
  });

  // ============ INIT ============
  loadStudents();
  updateStats();

})();
</script>
</body>
</html>
